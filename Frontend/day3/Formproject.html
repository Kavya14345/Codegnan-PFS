<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h1>Create Your Account</h1>
    <p>Join us and get started today!</p>
    <form action="Form">
        <label for="Fullname">Full Name:</label>
        <br>
        <input type="text" id="Fullname" name="Fullname" required />
        <br />
        <label for="email">Email Address:</label>
        <br>
        <input type="email" id="email" name="email" required />
        <br>
        <label for="password">Password:</label>
        <br>
        <input type="password" id="password" name="password" required />
        <br>
        <label for="confirmPassword">Confirm Password:</label>
        <br>
        <input type="password" id="confirmPassword" name="confirmPassword" required />
        <br>
        <label for="gender">Gender:</label>
        <br>
        <input type="radio" id="gender" name="gender" value="male">
        <label for="gender">Male</label>
        <input type="radio" id="gender" name="gender" value="female">
        <label for="gender">Female</label>
        <input type="radio" id="gender" name="gender" value="other">
        <label for="gender">Other</label>
        <br>
        <label for="dob">Date of Birth:</label>
        <br>
        <input type="date" id="dob" name="dob" required />
        <br>
        <label for="country">Country:</label>
        <br>
        <select id="country" name="country" required>
            <option value="">Select your country</option>
            <option value="USA">United States</option>
            <option value="Canada">Canada</option>
            <option value="UK">United Kingdom</option>
            <option value="Australia">Australia</option>
            <option value="India">India</option>
        </select>
        <br>
        <input type="checkbox" id="terms" name="terms" required />
        <label for="terms">I agree to the <span style="color:Red;">Terms of services</span> and <span style="color:Red;">Privacy Policy</span></label>
        <br>
        <button type="submit" style="padding: 20px; width: 30%; background-color: crimson; color:antiquewhite">Register Now</button>
        <p>Already have an account? <a href="login.html"><span style="color: Red;">Login here</span></a></p>
    </form>
</body>
</html>
