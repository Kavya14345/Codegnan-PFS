<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel ="stylesheet" href="day4.css">
    <style>
        h2{
            color:green;
        }
        .title{
            color:cornflowerblue;
            background-color:yellow;
            width:40%;
            height:200px;
            padding:10px 20px 30px 40px;
            border: 10px outset red;
            border-radius: 20px;
            border-radius:30%;
            text-align:center;
            margin: 10px 20px 30px 40px;
            display:inline-block;
            background-image: url('https://png.pngtree.com/thumb_back/fh260/background/20250205/pngtree-soft-pastel-floral-design-light-blue-background-image_16896113.jpg');
            background-repeat: no-repeat;
            background-size: cover;
            background-size: contain;
            background-size: 100% 100%;
            /*background-attachment: fixed;*/
        }
        div{
            background-color:lightblue;
            width:75%;
            height:200px;
            padding:30px;
            margin:20px;
        }
        span{
            background-color:lightgreen;
            width:500px;
            height:300px;
            padding:10px;
            margin:20px;
            display:inline-block;
        }
        #el1{
            color:aquamarine;
        }
    </style>
    <title>Document</title>
</head>
<body>
    <h1 style="color:red;">inline content</h1>
    <div>block level element</div>
    <span>inline level element</span>
    <br>
    <h2 class="title">internal content</h2>
    <h2 class="title">internal content</h2>
    <h2 class="title" id="el1">internal content</h2>
    <h2 class="title">internal content</h2>
    <h3 id="el1">External content</h3>
</body>
</html>
