<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="">
      <label for="username">Enter Username:</label>
      <input type="text" id="username" name="username" placeholder="Enter your username" required/>
      <br />
      <label for="email">Enter Email:</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" required />
      <br />
      <label for="password">Enter Password:</label>
      <input type="password" id="password" name="password" placeholder="Enter your password" required />
      <br />
      <label for="phoneno">Enter Phone Number:</label>
      <input type="tel" id="phoneno" name="phoneno" placeholder="Enter your phone number" />
      <br />
      <label for="slot">Select a time slot:</label>
      <input type="datetime-local" id="slot" name="slot"/>
      <br />
      <label for="files">Upload Files:</label>
      <input type="file" id="files" name="files" />
      <br />
      <input type="date" id="date" name="date" />
      <input type="month" id="month" name="month" />
      <input type="week" id="week" name="week" />
      <input type="range" id="range" name="range" min="0" max="100" />
      <br>
      <label for="search">Search:</label>
      <input type="search" id="search" name="search" placeholder="Search..." />
      <p>select your tech stack</p>
      <input type="radio" name="skillset" id="pfs" value="Python">
      <label for="pfs">Python Full Stack</label>
      <br>
      <input type="radio" name="skillset" id="jfs" value="Java">
      <label for="jfs">Java Full Stack</label>
      <br>    
      <input type="radio" name="skillset" id="mern" value="MERN">
      <label for="mern">MERN Stack</label>
      <br>
      <p>select your tech stack</p>
      <input type="checkbox" name="skills" id="pfs" value="Python">
      <label for="pfs">Python Full Stack</label>
      <br>
      <input type="checkbox" name="skills" id="jfs" value="Java">
      <label for="jfs">Java Full Stack</label>
      <br>    
      <input type="checkbox" name="skills" id="mern" value="MERN">
      <label for="mern">MERN Stack</label>
      <br>
      <label for="country">Select your country:</label>
      <select name="country" id="country">
        <option value="India">India</option>
        <option value="USA">USA</option>
        <option value="UK">UK</option>
        <option value="Canada">Canada</option>
      </select>
      <br>
      <textarea name="message" id="message" cols="30" rows="10" placeholder="Enter your message"></textarea>
      <br>
      <input type="radio" required><label for=""><span style="color:blue;">I agree for terms and conditions</span></label>
      <br>
      <button type="submit">Submit</button>
      <button type="reset">Reset</button>
    </form>
  </body>
</html>
